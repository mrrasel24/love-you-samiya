<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Swipe Flip Image</title>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #111;
  margin: 0;
}

.flip-container {
  width: 1013px;
  height: 638px;
  perspective: 1000px;
  cursor: pointer;
  touch-action: pan-y; /* swipe smooth */
}

.flipper {
  width: 100%;
  height: 100%;
  transition: 0.6s;
  transform-style: preserve-3d;
  position: relative;
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
}

.back {
  transform: rotateY(180deg);
}

img {
  width: 100%;
  height: 100%;
  border-radius: 15px;
}
</style>

</head>

<body>

<div class="flip-container" id="card">
  <div class="flipper">

    <div class="front">
      <img src="https://lh3.googleusercontent.com/d/16QcULnMsUlf84Pq6MZZNKWYfjU9yTPyS">
    </div>

    <div class="back">
      <img src="https://lh3.googleusercontent.com/d/15pqftM2yAc7FqsObVRo6rFDH9XmiIZSv">
    </div>

  </div>
</div>

<script>
let angle = 0;

const card = document.getElementById("card");

function flip(direction) {
  if (direction === "left") {
    angle -= 180;
  } else {
    angle += 180;
  }

  card.querySelector(".flipper").style.transform =
    `rotateY(${angle}deg)`;
}

/* CLICK */
card.addEventListener("click", function (event) {
  const box = card.getBoundingClientRect();
  const clickX = event.clientX - box.left;

  if (clickX < box.width / 2) {
    flip("left");
  } else {
    flip("right");
  }
});

/* SWIPE (FIXED) */
let startX = 0;

card.addEventListener("touchstart", function (e) {
  startX = e.touches[0].clientX;
});

card.addEventListener("touchend", function (e) {
  let endX = e.changedTouches[0].clientX;
  let diff = endX - startX; // ✅ FIX: reversed logic corrected

  // swipe right → right flip
  if (diff > 50) {
    flip("right");
  }

  // swipe left → left flip
  if (diff < -50) {
    flip("left");
  }
});
</script>

</body>
</html>
